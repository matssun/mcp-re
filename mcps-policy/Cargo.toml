[package]
name = "mcps-policy"
version = "0.2.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "MCP-S delegated authorization (Phase 5): AuthorizationProfile abstraction + Reference Signed Authorization Profile. Pluggable Biscuit/UCAN/OAuth-bound profiles later."

[dependencies]
# Phase 5 (ADR-MCPS-013). Interprets the artifact behind Core's opaque
# authorization_hash. Pure — depends only on mcps-core + serde. No networking/async.
mcps-core = { path = "../mcps-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[lib]
name = "mcps_policy"
path = "src/lib.rs"
