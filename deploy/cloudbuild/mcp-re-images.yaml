# SPDX-License-Identifier: Apache-2.0
# Cloud Build config: the two deployable amd64 images (proxy PEP + FastMCP inner)
# for the GKE fleet. Builds natively on amd64 (no local QEMU) and pushes to
# Artifact Registry. See docs/security/gke-slo-baseline-runbook.md.
#
#   gcloud builds submit --config deploy/cloudbuild/mcp-re-images.yaml .
#
# Substitutions: _AR = the Artifact Registry docker path prefix.
substitutions:
  _AR: us-central1-docker.pkg.dev/project-b19bbb5e-9be8-4fcb-a2f/mcp-re
steps:
  - name: gcr.io/cloud-builders/docker
    id: proxy
    args: [build, -f, deploy/docker/Dockerfile, --target, proxy, -t, "${_AR}/mcp-re-proxy:0.13.0", .]
  - name: gcr.io/cloud-builders/docker
    id: inner
    args: [build, -f, deploy/docker/Dockerfile.inner, -t, "${_AR}/mcp-re-inner-fastmcp:0.13.0", .]
  # Proof 4 (zero-drop rolling update) drives load from an IN-CLUSTER generator; the
  # GKE fleet pulls this image from AR (the kind path builds it locally). Without it,
  # Proof 4 cannot run on GKE.
  - name: gcr.io/cloud-builders/docker
    id: loadgen
    args: [build, -f, deploy/docker/Dockerfile.loadgen, -t, "${_AR}/mcp-re-loadgen:0.13.0", .]
images:
  - "${_AR}/mcp-re-proxy:0.13.0"
  - "${_AR}/mcp-re-inner-fastmcp:0.13.0"
  - "${_AR}/mcp-re-loadgen:0.13.0"
options:
  machineType: E2_HIGHCPU_8
timeout: 2400s
