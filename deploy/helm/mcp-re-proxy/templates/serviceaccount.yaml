# SPDX-License-Identifier: Apache-2.0
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mcp-re-proxy.serviceAccountName" . }}
  labels:
    {{- include "mcp-re-proxy.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  # On GKE, bind a Google Service Account here via Workload Identity:
  #   iam.gke.io/gcp-service-account: <gsa>@<project>.iam.gserviceaccount.com
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
