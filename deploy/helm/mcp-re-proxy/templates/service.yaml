apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-re-proxy.fullname" . }}
  labels:
    {{- include "mcp-re-proxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  # MCPS-83 (ADR-MCPS-049 clause 2): the MCP-RE authenticity checks run identically
  # on every replica, so client→proxy affinity is only about inner-session
  # continuity. The inner plane is stateless Streamable-HTTP (ADR-MCPRE-051 §3), so
  # `None` (plain round-robin) is the default; set service.sessionAffinity=ClientIP
  # only when fronting a session-stateful inner backend without its own stickiness.
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  selector:
    {{- include "mcp-re-proxy.selectorLabels" . | nindent 4 }}
  ports:
    - name: mcp-re
      port: {{ .Values.bindPort }}
      targetPort: mcp-re
      protocol: TCP
