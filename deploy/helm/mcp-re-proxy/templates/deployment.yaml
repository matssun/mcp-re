# SPDX-License-Identifier: Apache-2.0
{{- include "mcp-re-proxy.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-re-proxy.fullname" . }}
  labels:
    {{- include "mcp-re-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-re-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-re-proxy.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "mcp-re-proxy.serviceAccountName" . }}
      # MCPS-88: SIGTERM triggers a graceful drain (stop accepting, finish the
      # in-flight request, exit 0). Give the kubelet headroom over the request
      # deadline so a rollout drains rather than kills.
      terminationGracePeriodSeconds: {{ .Values.drainGracePeriodSeconds }}
      containers:
        - name: mcp-re-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--bind"
            - "0.0.0.0:{{ .Values.bindPort }}"
            {{- if .Values.strict }}
            - "--strict"
            {{- end }}
            {{- if .Values.fleet }}
            - "--fleet"
            {{- end }}
            - "--replay-cache"
            - "shared"
            - "--replay-redis-url"
            - {{ .Values.replay.redisUrl | quote }}
            - "--replay-durability-tier"
            - {{ .Values.replay.durabilityTier | quote }}
            - "--revocation-tier"
            - {{ .Values.revocation.tier | quote }}
            {{- if .Values.revocation.trustEpochRedisUrl }}
            - "--trust-epoch-redis-url"
            - {{ .Values.revocation.trustEpochRedisUrl | quote }}
            - "--trust-epoch-key"
            - {{ .Values.revocation.trustEpochKey | quote }}
            {{- end }}
            - "--max-client-cert-lifetime"
            - "{{ .Values.maxClientCertLifetimeSeconds }}"
            - "--audience"
            - {{ .Values.identity.audience | quote }}
            - "--server-signer"
            - {{ .Values.identity.serverSigner | quote }}
            - "--server-key-id"
            - {{ .Values.identity.serverKeyId | quote }}
            {{- if eq .Values.keySource "gcpKms" }}
            # Cloud KMS custody: the signing key never enters the pod. On GKE the
            # token comes from the Workload-Identity metadata server (useMetadata).
            - "--key-source"
            - "gcp-kms"
            - "--gcp-kms-key-version"
            - {{ .Values.gcpKms.keyVersion | quote }}
            {{- if .Values.gcpKms.endpoint }}
            - "--gcp-kms-endpoint"
            - {{ .Values.gcpKms.endpoint | quote }}
            {{- end }}
            {{- if .Values.gcpKms.useMetadata }}
            - "--gcp-kms-use-metadata"
            {{- end }}
            {{- if .Values.gcpKms.tlsKeyVersion }}
            # Delegated TLS: the TLS server private key also stays in KMS, so the
            # exported --tls-key is omitted (the proxy rejects both together).
            - "--gcp-kms-tls-key-version"
            - {{ .Values.gcpKms.tlsKeyVersion | quote }}
            {{- end }}
            {{- else }}
            - "--key-source"
            - "file"
            - "--signing-key-seed"
            - "{{ .Values.tls.mountPath }}/signing-seed"
            {{- end }}
            - "--tls-cert"
            - "{{ .Values.tls.mountPath }}/tls.crt"
            {{- if not (and (eq .Values.keySource "gcpKms") .Values.gcpKms.tlsKeyVersion) }}
            - "--tls-key"
            - "{{ .Values.tls.mountPath }}/tls.key"
            {{- end }}
            - "--client-ca"
            - "{{ .Values.tls.mountPath }}/client-ca.pem"
            - "--trust"
            - "{{ .Values.tls.mountPath }}/trust.json"
            # Inner plane (ADR-MCPRE-051 §3): the PEP forwards to a stateless
            # Streamable-HTTP backend. With stdioBridge enabled the backend is the
            # in-pod out-of-TCB adapter on loopback; otherwise the operator's own
            # HTTP backend fleet (repeated --inner-http-url ⇒ round-robin).
            {{- if .Values.inner.stdioBridge.enabled }}
            - "--inner-http-url"
            - {{ printf "http://%s%s" .Values.inner.stdioBridge.listen .Values.inner.stdioBridge.path | quote }}
            {{- else }}
            {{- range .Values.inner.httpUrls }}
            - "--inner-http-url"
            - {{ . | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: mcp-re
              containerPort: {{ .Values.bindPort }}
          # MCPS-88: the proxy speaks MCP-RE over TLS (no HTTP server), so the
          # honest probe is a tcpSocket check against the bind port — "port
          # accepting" genuinely means "ready to serve".
          readinessProbe:
            tcpSocket:
              port: mcp-re
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mcp-re
            periodSeconds: 10
          volumeMounts:
            - name: material
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.inner.stdioBridge.enabled }}
        # Out-of-TCB stdio↔HTTP adapter (ADR-MCPRE-051 §3, MCPRE-118). Fronts a
        # stdio-only MCP server so the PEP reaches it over loopback HTTP like any
        # backend. This container carries the subprocess/sandbox surface that was
        # REMOVED from the PEP; a compromise here cannot forge a signature or
        # defeat replay — those live entirely in the mcp-re-proxy container.
        - name: mcp-re-stdio-bridge
          image: "{{ .Values.inner.stdioBridge.image.repository }}:{{ .Values.inner.stdioBridge.image.tag }}"
          imagePullPolicy: {{ .Values.inner.stdioBridge.image.pullPolicy }}
          args:
            - "--listen"
            - {{ .Values.inner.stdioBridge.listen | quote }}
            - "--inner-mode"
            - {{ .Values.inner.stdioBridge.mode | quote }}
            # Everything after `--` is the wrapped stdio server command, verbatim.
            - "--"
            {{- range .Values.inner.stdioBridge.command }}
            - {{ . | quote }}
            {{- end }}
        {{- end }}
      volumes:
        - name: material
          secret:
            secretName: {{ .Values.tls.secretName | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
