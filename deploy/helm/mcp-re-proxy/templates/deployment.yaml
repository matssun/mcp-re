# SPDX-License-Identifier: Apache-2.0
{{- include "mcp-re-proxy.validate" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-re-proxy.fullname" . }}
  labels:
    {{- include "mcp-re-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp-re-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcp-re-proxy.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "mcp-re-proxy.serviceAccountName" . }}
      # MCPS-88: SIGTERM triggers a graceful drain (stop accepting, finish the
      # in-flight request, exit 0). Give the kubelet headroom over the request
      # deadline so a rollout drains rather than kills.
      terminationGracePeriodSeconds: {{ .Values.drainGracePeriodSeconds }}
      containers:
        - name: mcp-re-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--bind"
            - "0.0.0.0:{{ .Values.bindPort }}"
            # There is NO security toggle: the proxy always runs the maximal-security
            # posture and refuses any unsafe config at startup. `--fleet` selects the
            # horizontally-scaled TOPOLOGY (it does not relax security) and additionally
            # rejects node-local replay caches.
            {{- if .Values.fleet }}
            - "--fleet"
            {{- end }}
            - "--replay-cache"
            - "shared"
            - "--replay-redis-url"
            - {{ .Values.replay.redisUrl | quote }}
            - "--replay-durability-tier"
            - {{ .Values.replay.durabilityTier | quote }}
            - "--revocation-tier"
            - {{ .Values.revocation.tier | quote }}
            {{- if .Values.revocation.trustEpochRedisUrl }}
            - "--trust-epoch-redis-url"
            - {{ .Values.revocation.trustEpochRedisUrl | quote }}
            - "--trust-epoch-key"
            - {{ .Values.revocation.trustEpochKey | quote }}
            {{- end }}
            - "--max-client-cert-lifetime"
            - "{{ .Values.maxClientCertLifetimeSeconds }}"
            - "--audience"
            - {{ .Values.identity.audience | quote }}
            # RFC 9421 audience tuple (ADR-MCPRE-050): the signed request's audience
            # block must equal {audience, targetUri, route} AND targetUri must match
            # the request @target-uri, or the proxy fails closed invalid_audience.
            - "--target-uri"
            - {{ .Values.identity.targetUri | quote }}
            - "--trust-domain"
            - {{ .Values.identity.trustDomain | quote }}
            {{- if .Values.identity.route }}
            - "--route"
            - {{ .Values.identity.route | quote }}
            {{- end }}
            - "--server-signer"
            - {{ .Values.identity.serverSigner | quote }}
            - "--server-key-id"
            - {{ .Values.identity.serverKeyId | quote }}
            # ADR-MCPRE-052: delegated-signing is the ONLY response mode. The root key
            # (KMS/file) is the credential ISSUER off the request path; an in-memory
            # delegated key signs each response. The trust epoch is required and must be
            # coordinated with the verifiers' accepted-epoch set (§7).
            - "--delegated-trust-epoch"
            - {{ .Values.identity.delegatedTrustEpoch | quote }}
            {{- if eq .Values.keySource "gcpKms" }}
            # Cloud KMS custody: the signing key never enters the pod. On GKE the
            # token comes from the Workload-Identity metadata server (useMetadata).
            - "--key-source"
            - "gcp-kms"
            - "--gcp-kms-key-version"
            - {{ .Values.gcpKms.keyVersion | quote }}
            {{- if .Values.gcpKms.endpoint }}
            - "--gcp-kms-endpoint"
            - {{ .Values.gcpKms.endpoint | quote }}
            {{- end }}
            {{- if .Values.gcpKms.useMetadata }}
            - "--gcp-kms-use-metadata"
            {{- end }}
            {{- if .Values.gcpKms.tlsKeyVersion }}
            # Delegated TLS: the TLS server private key also stays in KMS, so the
            # exported --tls-key is omitted (the proxy rejects both together).
            - "--gcp-kms-tls-key-version"
            - {{ .Values.gcpKms.tlsKeyVersion | quote }}
            {{- end }}
            {{- else }}
            - "--key-source"
            - "file"
            - "--signing-key-seed"
            - "{{ .Values.tls.mountPath }}/signing-seed"
            {{- end }}
            - "--tls-cert"
            - "{{ .Values.tls.mountPath }}/tls.crt"
            {{- if not (and (eq .Values.keySource "gcpKms") .Values.gcpKms.tlsKeyVersion) }}
            - "--tls-key"
            - "{{ .Values.tls.mountPath }}/tls.key"
            {{- end }}
            - "--client-ca"
            - "{{ .Values.tls.mountPath }}/client-ca.pem"
            - "--trust"
            - "{{ .Values.tls.mountPath }}/trust.json"
            {{- if .Values.transportBinding }}
            # mTLS channel binding (ADR-MCPS-023). `exact` (the proxy default and
            # the fail-safe) binds each signed request to the verified client-cert
            # identity. `none` decouples them — only for a reference deploy driven
            # by an HTTP-profile client that carries no channel-binding claim (the
            # shipped mcp_re_gke_client / SDK e2e). lb-assertion / attested-ingress
            # need their own ingress key/anchor values.
            - "--transport-binding"
            - {{ .Values.transportBinding | quote }}
            {{- end }}
            # Inner plane (ADR-MCPRE-051 §3): the PEP forwards to one or more
            # stateless Streamable-HTTP backends (repeated --inner-http-url ⇒
            # round-robin). MCP-RE is HTTP-profile only — a stdio-only server is
            # fronted by an EXTERNAL plain-MCP adapter (e.g. FastMCP) that exposes
            # HTTP; point httpUrls at that adapter.
            {{- range .Values.inner.httpUrls }}
            - "--inner-http-url"
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: mcp-re
              containerPort: {{ .Values.bindPort }}
          # MCPS-88: the proxy speaks MCP-RE over TLS (no HTTP server), so the
          # honest probe is a tcpSocket check against the bind port — "port
          # accepting" genuinely means "ready to serve".
          readinessProbe:
            tcpSocket:
              port: mcp-re
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mcp-re
            periodSeconds: 10
          {{- if gt (int .Values.drainPreStopSeconds) 0 }}
          # Close the L4 LoadBalancer endpoint-propagation race: on pod deletion
          # keep serving for a short window BEFORE the proxy receives SIGTERM, so
          # the LB stops routing new connections to this pod before it drains. The
          # proxy's own SIGTERM drain (finish in-flight, stop accepting) then runs
          # within terminationGracePeriodSeconds. Without this, a new connection can
          # reach a pod in the ~1s between SIGTERM and its removal from the LB.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.drainPreStopSeconds }}"]
          {{- end }}
          volumeMounts:
            - name: material
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: material
          secret:
            secretName: {{ .Values.tls.secretName | quote }}
            # The proxy refuses to start on a group/world-readable key file
            # (signing-seed, tls.key). Secret volumes default to 0644; mount
            # owner-read-only.
            defaultMode: 0400
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
