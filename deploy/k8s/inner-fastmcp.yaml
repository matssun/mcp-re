# SPDX-License-Identifier: Apache-2.0
#
# The ALLOWED inner plane for the MCP-RE fleet (ADR-MCPRE-051 §3): a real FastMCP
# Streamable-HTTP MCP backend that the proxy forwards verified requests to over
# `--inner-http-url`. This is the HTTP-profile replacement for the removed
# stdio-bridge sidecar. Point the proxy chart at it with:
#
#   helm upgrade ... --set 'inner.httpUrls={http://mcp-re-inner-fastmcp:8620/mcp/}'
#
# The port (8620) is the registry value config/ports.toml
# [services.mcp_re_inner_backend].port — keep the two in sync.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-re-inner-fastmcp
  labels:
    app.kubernetes.io/name: mcp-re-inner-fastmcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-re-inner-fastmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-re-inner-fastmcp
    spec:
      containers:
        - name: fastmcp
          image: mcp-re-inner-fastmcp:0.12.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_RE_INNER_BACKEND_HOST
              value: "0.0.0.0"
            - name: MCP_RE_INNER_BACKEND_PORT
              value: "8620"
          ports:
            - name: http
              containerPort: 8620
          # FastMCP's Python import + Uvicorn startup can take 30-60s on a cold
          # Autopilot node (node provisioning + first boot). Give the LIVENESS probe
          # a 60s initialDelay + headroom so it never SIGKILLs the container mid-boot
          # (that crashloops the pod until the node happens to warm up); readiness
          # keeps polling through the boot window without failing the rollout.
          readinessProbe:
            tcpSocket:
              port: 8620
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8620
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-re-inner-fastmcp
  labels:
    app.kubernetes.io/name: mcp-re-inner-fastmcp
spec:
  selector:
    app.kubernetes.io/name: mcp-re-inner-fastmcp
  ports:
    - name: http
      port: 8620
      targetPort: 8620
