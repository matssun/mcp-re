# SPDX-License-Identifier: Apache-2.0
#
# MCP-RE continuous integration. The Rust toolchain is pinned by the committed
# rust-toolchain.toml (1.94.1, matching the Bazel build), so rustup installs and
# selects it automatically on the first cargo invocation — CI and local dev share
# one toolchain.
#
# Gating policy:
#   - BLOCKING: `cargo build` + `cargo test` over the whole workspace (this
#     includes the mcp-re-conformance suite + the conformance drift guard, which
#     resolve their fixtures via the cargo runfiles fallback in mcp-re-test-paths).
#   - BLOCKING: `cargo test` over mcp-re-proxy with the four NON-DEFAULT feature
#     gates enabled (dev_env_key_source, pkcs11_keysource, redis_replay,
#     online_ocsp). The default `cargo test --workspace` does NOT compile these
#     modules, so without this job the v0.3 hardening that lives behind them
#     (the Redis WAIT-quorum fake-connection harness, the PKCS#11 sign-loop
#     proof, the OCSP AIA-SSRF inet_aton parser, the env-key-source no-mutation
#     contract) would have zero cargo-CI coverage. The PKCS#11 sign+verify e2e
#     runs against a hermetic in-tree mock provider, so it needs no external
#     token. The remaining live-infra e2e tests (real Redis / OCSP responder)
#     self-skip cleanly when their MCP_RE_TEST_* env vars are unset; they hard-fail
#     only when MCP_RE_REQUIRE_LIVE_INFRA is set, which this job leaves unset.
#   - ADVISORY (continue-on-error): `cargo fmt --check` and `cargo clippy`. The
#     repository was not developed under `cargo fmt`/`clippy -D warnings`, so these
#     surface drift without blocking. Promote them to blocking once a one-time
#     repo-wide format + lint cleanup lands (and bump rust-toolchain.toml together).
#   - BLOCKING (ADR-MCPS-048 / MCPS-70): the `bazel` job gates the OTHER build
#     system. Bazel was ungated, which is exactly how #220 (Bazel/cargo drift)
#     happened. Two steps: (1) the semantic-drift gate — gazelle_rust as a drift
#     DETECTOR (not a byte-authority): fails if the Cargo graph has a target/edge
#     the committed BUILD omits, modulo the script's allowlist; (2) `bazel test
#     //...` parity with the cargo suite.
#   - BLOCKING (ADR-MCPS-048 / MCPS-71): the `sdk-python` and `sdk-typescript`
#     jobs make "downloaders skip Bazel" a VERIFIED path, not a rotting side
#     artifact. Each builds the ecosystem-native artifact (maturin wheel / napi
#     package) from the SAME source, installs it into a clean environment
#     (fresh venv / empty npm project — wheel/tarball only, no editable, no
#     workspace on sys.path), and runs the SDK test suite. Neither job installs
#     or invokes Bazel; the e2e suites that need the built Rust binaries
#     self-skip cleanly (their guards check for the target/{debug,release}
#     binaries + cargo), so the clean-env lane exercises the unit surface. The
#     cargo jobs above are the third downloader path (pure `cargo`, no Bazel).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo:
    name: cargo build + test (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cryptoki-sys (declared non-optional for Bazel target exposure) builds its
      # FFI bindings with libclang; install it defensively so the cargo closure
      # links on a clean runner.
      - name: System build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libclang-dev

      - name: Select pinned toolchain (from rust-toolchain.toml)
        run: rustup show && rustc --version && cargo --version

      - name: Build (workspace, all targets)
        run: cargo build --workspace --all-targets

      - name: Test (workspace, incl. conformance suite + drift guard)
        run: cargo test --workspace

      - name: Format check (advisory)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

  cargo-features:
    name: cargo test (feature-gated backends, 1.94.1)
    runs-on: ubuntu-latest
    # No live infra is provisioned here, so MCP_RE_REQUIRE_LIVE_INFRA is left unset
    # and the *_e2e_test suites self-skip. This job exercises the feature-gated
    # UNIT tests + adapter compilation only.
    steps:
      - uses: actions/checkout@v4

      # cryptoki-sys builds its FFI bindings with libclang (see the `cargo` job).
      - name: System build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libclang-dev

      - name: Select pinned toolchain (from rust-toolchain.toml)
        run: rustup show && rustc --version && cargo --version

      # Build the WHOLE workspace (not just -p mcp-re-proxy): the proxy's
      # integration tests (persistent_inner_test, persistent_scope_test) spawn
      # the cross-crate `mcp-re-demo-server` fixture binary, which cargo does NOT
      # auto-build for another crate's integration tests. `--workspace` puts it
      # (and the echo-inner fixture) in target/debug for mcp-re-test-paths to find.
      - name: Build (workspace, all feature gates)
        run: >-
          cargo build --workspace --all-targets
          --features dev_env_key_source,pkcs11_keysource,redis_replay,online_ocsp,aws_kms_keysource,gcp_kms_keysource

      - name: Test (mcp-re-proxy, all feature gates; e2e self-skip without live infra)
        run: >-
          cargo test -p mcp-re-proxy
          --features dev_env_key_source,pkcs11_keysource,redis_replay,online_ocsp,aws_kms_keysource,gcp_kms_keysource

  bazel:
    name: bazel semantic-drift gate + test parity
    runs-on: ubuntu-latest
    # ADR-MCPS-048 / MCPS-70 — the enforcement that makes generation stick.
    # Runs on Linux so the platform-gated crates (seccompiler, landlock) compile
    # (they are cfg'd out on macOS); this is also the canonical hermetic target.
    steps:
      - uses: actions/checkout@v4

      # The FFI closure (cryptoki-sys) builds bindings with libclang, same as the
      # cargo jobs; install it so the Bazel build links on a clean runner.
      - name: System build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libclang-dev

      # Cache the Bazel repository + disk cache across runs (crate_universe hub,
      # the gazelle_rust Go binary, rules_go/gazelle). Keyed on the module lock +
      # Cargo lock so a dependency change busts it.
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'Cargo.lock') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Bazel version
        run: bazel version

      # (1) Semantic-drift gate: fails if a `use`/test lacks its BUILD target/edge.
      - name: BUILD semantic-drift gate (gazelle as drift detector)
        run: python3 scripts/bazel_gazelle_gate.py

      # (2) Parity: the Bazel suite must pass like the cargo suite.
      - name: Bazel test parity (//...)
        run: bazel test //... --test_output=errors

  sdk-python:
    name: downloader — Python maturin wheel (no Bazel)
    runs-on: ubuntu-latest
    # ADR-MCPS-048 / MCPS-71 — the pip downloader path. sdk/python is its OWN
    # Cargo workspace (empty [workspace] table) linking the audited
    # mcp-re-client-core / mcp-re-core via path deps; the pyo3 layer is abi3-py39, so
    # ONE wheel serves any CPython >= 3.9. No cryptoki/openssl in the SDK closure,
    # so no libclang is needed. Bazel is neither installed nor invoked.
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The pinned Rust toolchain (rust-toolchain.toml at the repo root) applies
      # here too — rustup walks up to it — so the wheel is built with the same
      # compiler as the cargo/bazel gates.
      - name: Select pinned toolchain (from rust-toolchain.toml)
        run: rustup show && rustc --version && cargo --version

      - name: Install maturin
        run: pip install "maturin>=1.5,<2.0"

      - name: Build the release wheel
        run: maturin build --release --out dist

      # Clean-env smoke install: a fresh venv gets ONLY the built wheel plus the
      # upstream MCP SDK + pytest — never an editable install and never the
      # source python/ tree on sys.path, so `import mcp_re_sdk` resolves to the
      # INSTALLED wheel (its native mcp_re_sdk._core), proving the downloader
      # artifact stands on its own.
      - name: Clean-env install (wheel only) + smoke import
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install --upgrade pip
          /tmp/venv/bin/pip install dist/*.whl "mcp>=1.16" "pytest>=8"
          /tmp/venv/bin/python -c "import mcp_re_sdk, mcp_re_sdk._core; print('wheel import OK')"

      # Run the SDK suite against the installed wheel from the repo root so the
      # source package cannot shadow it. The e2e/mtls tests self-skip (no built
      # workspace binaries in this Bazel-free lane); the unit surface runs.
      - name: pytest (installed wheel; e2e self-skip without binaries)
        working-directory: ${{ github.workspace }}
        run: /tmp/venv/bin/python -m pytest sdk/python/tests -q

  sdk-typescript:
    name: downloader — TypeScript napi package (no Bazel)
    runs-on: ubuntu-latest
    # ADR-MCPS-048 / MCPS-71 — the npm downloader path. sdk/typescript is its OWN
    # Cargo workspace (empty [workspace] table) linking mcp-re-client-core via a
    # path dep; @napi-rs/cli builds the Node native addon. Bazel is neither
    # installed nor invoked.
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Select pinned toolchain (from rust-toolchain.toml)
        run: rustup show && rustc --version && cargo --version

      - name: Install JS dependencies
        run: npm ci

      # napi build (native .node) + tsc (dist/). This is the published artifact's
      # exact build.
      - name: Build native addon + TypeScript
        run: npm run build

      - name: Test (vitest; live-transport tests self-skip without binaries)
        run: npx vitest run

      # Clean-env smoke install: pack the tarball exactly as published, install it
      # into an EMPTY project (no dev deps, no workspace), and require it — the
      # bundled native/*.node must load on its own.
      - name: Pack + clean-dir install smoke
        run: |
          npm pack --pack-destination /tmp
          TGZ=$(ls -t /tmp/mcp-re-sdk-*.tgz | head -1)
          mkdir -p /tmp/npm-smoke && cd /tmp/npm-smoke
          npm init -y >/dev/null
          npm install --no-audit --no-fund "$TGZ"
          node -e "const m=require('@mcp-re/sdk'); if(typeof m.signRequest!=='function'){throw new Error('napi package export missing');} console.log('npm package require OK')"
