[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "mcp-re-sdk"
version = "0.1.0"
description = "MCP-RE Python SDK — runtime-evidence security (signed requests, verified responses) for the MCP Python SDK, via a transport adapter over the audited mcp-re-client-core."
# mcp (the upstream SDK) requires >=3.10; match its floor.
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Mats Sundvall" }]
readme = "README.md"
# No hard runtime deps: the signing/verification core (mcp_re_sdk._core) needs none, and
# a caller who only wants the bindings should not be made to install the upstream MCP SDK.
# `mcp` is required only to open a real session, so it stays an extra.
dependencies = []

[project.optional-dependencies]
# The UPSTREAM MCP Python SDK (a third-party package, not MCP-RE) — required to open a
# session, not to load the core. The transport adapter binds to this package's seam:
# ClientSession consumes anyio streams of parsed `SessionMessage` objects, so JSON-RPC is
# serialized inside the transport and that is the only byte-exact place to sign. A major
# bump can move that seam, so the range is capped rather than open-ended (#413).
mcp = ["mcp>=1.16,<2.0"]
# dev pulls in `mcp` (and its `anyio`) so the transport-adapter tests run.
dev = ["pytest>=8", "pytest-cov>=5", "maturin>=1.5,<2.0", "anyio>=4", "mcp>=1.16,<2.0"]

[tool.coverage.run]
# Only the hand-written Python layer is measured. The native `_core` extension is
# Rust behind PyO3 — coverage.py cannot see it, and the Rust it binds is covered by
# the cargo suites in the root workspace.
source = ["mcp_re_sdk"]
omit = ["*/_core*"]

[tool.coverage.report]
# The repo-wide bar. Below it, `pytest --cov` exits non-zero.
fail_under = 90
show_missing = true
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@overload",
]

[tool.maturin]
# Mixed Rust/Python layout: Python sources under python/, native ext built from
# the Cargo crate and installed as `mcp_re_sdk._core`.
python-source = "python"
module-name = "mcp_re_sdk._core"
features = ["pyo3/extension-module"]
