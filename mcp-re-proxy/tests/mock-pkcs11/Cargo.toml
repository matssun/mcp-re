# Test-only MOCK PKCS#11 provider — a hermetic Cryptoki `cdylib` that implements
# exactly the surface `mcp-re-proxy`'s PKCS#11 client calls (C_Initialize/Finalize,
# slot/token enumeration, session + login, find/sign/attr). It is NOT a product
# artifact and NOT a workspace member: the empty `[workspace]` table below detaches
# it from the parent workspace so `cargo build`/gazelle never pull it into the proxy
# build graph. The `pkcs11_keysource_e2e_test` builds it on the fly (nested `cargo
# build` into this crate's own target dir) and loads the resulting library so the
# PKCS#11 sign+verify path is exercised with no external token or tooling.
[package]
name = "mock_pkcs11"
version = "0.0.0"
edition = "2021"
publish = false
license = "Apache-2.0"

# Detach from the parent workspace (this crate lives under mcp-re-proxy/tests/ but is
# deliberately not a member — it must never enter the proxy's cargo/Bazel closure).
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# Cryptoki C-ABI type definitions (CK_FUNCTION_LIST, CK_ATTRIBUTE, constants). The
# SAME crate the client binds, so the function-list ABI matches by construction.
cryptoki-sys = "0.1.8"
# Deterministic in-memory Ed25519 signing (RustCrypto — no custom crypto). Keys are
# seeded from SHA-256(label || id) so a public point read off the mock always matches
# the signature the mock produces, across re-initialisations.
ed25519-dalek = "2.1"
sha2 = "0.10"
